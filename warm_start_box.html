                        "surface-variant": "#353534",

                        "tertiary-fixed-dim": "#00dddd",
                        "on-error": "#690005",

<style>
        body {
            background-color: #131313;
            color: #e5e2e1;
            /* Cinematic Grain Overlay */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }
        
        /* Glassmorphism utility */
        .glass-panel {
            background-color: rgba(32, 31, 31, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Urgent glow */
        .glow-urgent {
            box-shadow: 0 0 20px 0px rgba(47, 248, 1, 0.15);
        }

        /* Pip pulse animation */
        @keyframes pulse-pip {
            0% { box-shadow: 0 0 0 0 rgba(47, 248, 1, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(47, 248, 1, 0); }
            100% { box-shadow: 0 0 0 0 rgba(47, 248, 1, 0); }
        }
        .pip-urgent {
            animation: pulse-pip 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen font-body-md flex items-center justify-center p-gutter">
<!-- Container matching SCREEN_16 context width loosely -->
<div class="w-full max-w-4xl space-y-md relative">
<!-- Ambient background glow behind the section -->
<div class="absolute -top-10 -left-10 w-64 h-64 bg-secondary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Section Header -->
<div class="flex items-center space-x-sm mb-sm relative z-10">
<div class="w-3 h-3 rounded-full bg-secondary-container pip-urgent"></div>
<h2 class="font-headline-lg text-headline-lg text-on-surface">Warm Starts Ready</h2>
</div>
<!-- The Warm Start Card -->
<div class="glass-panel rounded-xl p-md glow-urgent relative overflow-hidden group cursor-pointer transition-all duration-300 hover:border-secondary-container/30 hover:bg-surface-container/60">
<!-- Top Urgent Border Accent -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-secondary-container"></div>
<!-- Content -->
<div class="flex flex-col space-y-xs">
<h3 class="font-headline-lg-mobile text-headline-lg-mobile text-secondary-container transition-colors duration-300 group-hover:text-secondary-fixed">
                    Warm Start: Studio ready, from a selfie
                </h3>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Research, outline, and opening draft completed
                </p>
</div>
<!-- Hover effect overlay (subtle lightening) -->
<div class="absolute inset-0 bg-white/0 group-hover:bg-white/5 transition-colors pointer-events-none rounded-xl"></div>
</div>
</div>
</body></html>
